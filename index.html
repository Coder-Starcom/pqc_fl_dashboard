<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PQC Monitor (Direct)</title>
    <style>
      body {
        background: #0d1117;
        color: #c9d1d9;
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
      }
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        display: inline-block;
        min-width: 300px;
      }
      .status-online {
        color: #3fb950;
        font-weight: bold;
      }
      .status-offline {
        color: #f85149;
        font-weight: bold;
      }
      .value {
        font-size: 48px;
        margin: 20px 0;
        color: #58a6ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Coordinator Status</h2>
      <div id="status" class="status-offline">OFFLINE</div>
      <hr style="border: 0.5px solid #30363d; margin: 20px 0" />
      <h3>Current Round</h3>
      <div id="round" class="value">0</div>
    </div>

    <script>
      // TARGET RENDER DIRECTLY
      const RENDER_URL = "https://pq-federated-coordinator-v3.onrender.com";

      async function sync() {
        try {
          // Use 'no-cache' to force fresh data from Render
          const res = await fetch(RENDER_URL, { cache: "no-store" });
          if (!res.ok) throw new Error();
          const data = await res.json();

          document.getElementById("status").innerText = "ONLINE";
          document.getElementById("status").className = "status-online";
          document.getElementById("round").innerText = data.round;
          console.log("Sync Success:", data);
        } catch (e) {
          document.getElementById("status").innerText = "OFFLINE";
          document.getElementById("status").className = "status-offline";
          console.log("Sync failed. Render might be sleeping...");
        }
      }
      setInterval(sync, 5000);
      sync();
    </script>
  </body>
</html>
