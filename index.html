<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PQ Federated Learning Monitor</title>

    <!-- 1. Load Chart.js FIRST in the head -->
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
      :root {
        --bg: #f0f2f5;
        --dark: #1f2937;
        --accent: #2563eb;
        --success: #10b981;
        --error: #ef4444;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 0;
        color: var(--dark);
      }
      header {
        background: var(--dark);
        color: white;
        padding: 30px 20px;
        text-align: center;
        border-bottom: 4px solid var(--accent);
      }
      header h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 1px;
      }
      header p {
        margin: 5px 0 0;
        opacity: 0.7;
        font-size: 13px;
        text-transform: uppercase;
      }
      .container {
        width: 92%;
        max-width: 1100px;
        margin: 30px auto;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        text-align: center;
        border: 1px solid #e5e7eb;
      }
      .card h3 {
        margin: 0;
        font-size: 12px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .value {
        font-size: 32px;
        font-weight: 800;
        margin-top: 10px;
        color: var(--dark);
      }
      .status-online {
        color: var(--success);
      }
      .status-offline {
        color: var(--error);
      }
      .chart-box {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        border: 1px solid #e5e7eb;
      }
      .logs {
        background: #111827;
        color: #38bdf8;
        margin-top: 25px;
        padding: 20px;
        border-radius: 12px;
        height: 150px;
        overflow-y: auto;
        font-family: "ui-monospace", monospace;
        font-size: 12px;
        border: 1px solid #374151;
      }
      .log-line {
        padding: 2px 0;
        border-bottom: 1px solid #1f2937;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PQC Federated Learning Monitor</h1>
      <p>V3 Post-Quantum Encryption Stack</p>
    </header>

    <div class="container">
      <div class="cards">
        <div class="card">
          <h3>System Status</h3>
          <div id="status" class="value status-offline">Offline</div>
        </div>
        <div class="card">
          <h3>Training Round</h3>
          <div id="round" class="value">0</div>
        </div>
        <div class="card">
          <h3>Security Layer</h3>
          <div class="value" style="font-size: 18px; color: #6366f1">
            Kyber + Dilithium
          </div>
        </div>
        <div class="card">
          <h3>Accuracy (Est.)</h3>
          <div id="accuracy" class="value">0%</div>
        </div>
      </div>

      <div class="chart-box">
        <h3 style="margin-top: 0; font-size: 14px; color: #4b5563">
          Accuracy Progression
        </h3>
        <canvas id="accuracyChart" height="100"></canvas>
      </div>

      <div class="logs" id="log-output">
        <div class="log-line">Starting system sync...</div>
      </div>
    </div>

    <script>
      // 2. Wait for EVERYTHING (including Chart.js) to load
      window.onload = function () {
        const API_PATH = "/api/global_model";
        let accuracyChart;

        // Initialize Chart.js
        const ctx = document.getElementById("accuracyChart").getContext("2d");
        accuracyChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Accuracy %",
                data: [],
                borderColor: "#2563eb",
                backgroundColor: "rgba(37, 99, 235, 0.1)",
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            scales: {
              y: { min: 0, max: 1, ticks: { callback: (v) => v * 100 + "%" } },
            },
          },
        });

        function addLog(msg) {
          const logBox = document.getElementById("log-output");
          const div = document.createElement("div");
          div.className = "log-line";
          div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
          logBox.prepend(div);
        }

        async function syncData() {
          try {
            const response = await fetch(API_PATH);
            if (!response.ok) throw new Error("Service Unreachable");

            const data = await response.json();

            // Update UI
            document.getElementById("status").innerText = "Online";
            document.getElementById("status").className = "value status-online";
            document.getElementById("round").innerText = data.round;

            // Simulated Accuracy Logic for V3
            const currentAcc = Math.min(0.99, 0.68 + data.round * 0.055);
            document.getElementById("accuracy").innerText =
              Math.round(currentAcc * 100) + "%";

            // Update Chart
            const label = `R${data.round}`;
            if (!accuracyChart.data.labels.includes(label)) {
              accuracyChart.data.labels.push(label);
              accuracyChart.data.datasets[0].data.push(currentAcc);
              accuracyChart.update();
              addLog(
                `Round ${data.round} aggregated. PQC signatures verified.`,
              );
            }
          } catch (e) {
            document.getElementById("status").innerText = "Offline";
            document.getElementById("status").className =
              "value status-offline";
            addLog("Connection error: Retrying sync with Render...");
          }
        }

        // Initial sync and interval
        syncData();
        setInterval(syncData, 5000);
      };
    </script>
  </body>
</html>
