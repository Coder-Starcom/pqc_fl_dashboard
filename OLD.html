<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PQC Federated Learning Monitor</title>

    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --accent: #58a6ff;
        --success: #3fb950;
        --error: #f85149;
      }

      body {
        background: var(--bg);
        color: #c9d1d9;
        font-family:
          Segoe UI,
          Tahoma,
          sans-serif;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 30px;
        display: inline-block;
        min-width: 360px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      h2 {
        margin: 0;
        font-weight: 400;
        color: #8b949e;
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 2px;
      }

      .value {
        font-size: 64px;
        font-weight: 800;
        margin: 20px 0;
        color: var(--accent);
      }

      .status-online {
        color: var(--success);
        text-shadow: 0 0 10px rgba(63, 185, 80, 0.5);
      }

      .status-offline {
        color: var(--error);
        text-shadow: 0 0 10px rgba(248, 81, 73, 0.5);
      }

      .meta {
        margin-top: 20px;
        font-size: 13px;
        color: #7d8590;
      }

      .log-container {
        margin-top: 30px;
        width: 100%;
        max-width: 520px;
        margin-left: auto;
        margin-right: auto;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        font-family: monospace;
        font-size: 12px;
        height: 140px;
        overflow-y: auto;
        text-align: left;
      }

      .log-entry {
        border-bottom: 1px solid #21262d;
        padding: 4px 0;
        color: #7d8590;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Coordinator Status</h2>

      <div
        id="status"
        class="status-offline"
        style="font-weight: bold; font-size: 18px"
      >
        INITIALISING
      </div>

      <div id="round" class="value">0</div>

      <h2>Current Training Round</h2>

      <div class="meta">Model Dimension: <span id="dim">unknown</span></div>

      <div class="meta">
        Post-Quantum Security Layer: <span style="color: #bc8cff">ACTIVE</span>
      </div>
    </div>

    <div class="log-container" id="logs">
      <div class="log-entry">Searching for Coordinator...</div>
    </div>

    <script>
      const ENDPOINT =
        "https://pq-federated-coordinator-v3.onrender.com/global_model";

      function log(message) {
        const container = document.getElementById("logs");

        const entry = document.createElement("div");

        entry.className = "log-entry";

        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;

        container.prepend(entry);
      }

      async function sync() {
        try {
          const response = await fetch(ENDPOINT, {
            method: "GET",
            mode: "cors",
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const data = await response.json();

          document.getElementById("status").innerText = "ONLINE";
          document.getElementById("status").className = "status-online";

          document.getElementById("round").innerText = data.round;

          if (data.weights) {
            document.getElementById("dim").innerText = data.weights.length;
          }

          log("Global model retrieved successfully (round " + data.round + ")");
        } catch (error) {
          document.getElementById("status").innerText = "OFFLINE";
          document.getElementById("status").className = "status-offline";

          log("Connection failed: " + error.message);

          console.error(error);
        }
      }

      sync();

      setInterval(sync, 5000);
    </script>
  </body>
</html>
